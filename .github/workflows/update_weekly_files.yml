name: Atualizar Badge de Arquivos Semanais

on:
  schedule:
    - cron: '0 0 * * 1' # toda segunda-feira à meia-noite
  workflow_dispatch: # permite rodar manualmente

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependências
        run: pip install pybadges

      - name: Contar commits e arquivos alterados da semana
        run: |
          # Contar commits da semana
          WEEKLY_FILES=$(git log --since="7 days ago" --pretty=format: --name-only | sort | uniq | wc -l)
          echo "Arquivos alterados na semana: $WEEKLY_FILES"
          
          # Gerar badge SVG
          python - <<EOF
import pybadges

badge = pybadges.badge(
    label='Arquivos na semana',
    value='$WEEKLY_FILES',
    color='blue'
)

with open('badge_files_week.svg', 'w') as f:
    f.write(badge)
EOF

      - name: Commit e push do badge
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add badge_files_week.svg
          git commit -m "Atualizando badge de arquivos da semana"
          git push
