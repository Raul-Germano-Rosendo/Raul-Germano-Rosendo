name: Atualizar Badge de Commits Semanais

on:
  schedule:
    - cron: '0 0 * * 1' # toda segunda-feira à meia-noite
  workflow_dispatch: # permite rodar manualmente

jobs:
  update-weekly-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependências
        run: pip install pybadges

      - name: Contar commits diários da semana
        id: count_commits
        run: |
          echo "Calculando commits..."
          DAYS=("Mon" "Tue" "Wed" "Thu" "Fri" "Sat" "Sun")
          for DAY in "${DAYS[@]}"; do
            COUNT=$(git log --since="last monday" --date=format:'%a' --pretty=format:'%ad' | grep -c "$DAY")
            echo "$DAY=$COUNT" >> $GITHUB_ENV

      - name: Gerar badge SVG com commits diários
        run: |
          python3 - <<'EOF'
import os
import pybadges

days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
counts = [int(os.environ.get(day, "0")) for day in days]

# Criar representação visual simples: "▇" por commit
visual = " ".join(["▇"*count if count>0 else "-" for count in counts])

badge = pybadges.badge(
    label="Commits da semana",
    value=visual,
    color="green"
)

with open("badge_commits_week.svg", "w") as f:
    f.write(badge)
EOF

      - name: Commit e push do badge
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add badge_commits_week.svg
          git commit -m "Atualizando badge de commits da semana" || echo "Sem alterações para commitar"
          git push
