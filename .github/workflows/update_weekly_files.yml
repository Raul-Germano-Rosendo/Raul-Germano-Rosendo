name: Atualizar Badge de Commits Semanais

# Quando o workflow será executado
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # permite rodar manualmente
  schedule:
    - cron: '0 0 * * 1' # toda segunda-feira à meia-noite

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      # Checar repositório
      - name: Checkout
        uses: actions/checkout@v4

      # Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Instalar dependências
      - name: Instalar pybadges
        run: pip install pybadges

      # Contar commits diários da semana
      - name: Contar commits
        run: |
          echo "Calculando commits..."
          DAYS=("Mon" "Tue" "Wed" "Thu" "Fri" "Sat" "Sun")
          for DAY in "${DAYS[@]}"; do
            COUNT=$(git log --since="last monday" --date=format:'%a' --pretty=format:'%ad' | grep -c "$DAY")
            echo "$DAY=$COUNT" >> $GITHUB_ENV

      # Gerar badge SVG
      - name: Gerar badge SVG
        run: |
          python3 - <<'EOF'
import os
import pybadges

days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
counts = [int(os.environ.get(day, "0")) for day in days]

# Criar visual simples: "▇" por commit, "-" se nenhum
visual = " ".join(["▇"*count if count > 0 else "-" for count in counts])

badge = pybadges.badge(
    label="Commits da semana",
    value=visual,
    color="green"
)

with open("badge_commits_week.svg", "w") as f:
    f.write(badge)
EOF

      # Commit e push do badge
      - name: Commit e push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add badge_commits_week.svg
          git commit -m "Atualizando badge de commits da semana" || echo "Sem alterações para commitar"
          git push
